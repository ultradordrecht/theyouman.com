Voortgekomen uit de gestrande stadsstrand-ideeën ontstaat het project Kunstrand van Dordt nu op de Stadswerven naast de Ark en de Biesboschhal. Gedurende de zomer zullen hier diverse ontmoetingsmomenten plaatsvinden met bijzondere activiteiten, betreffende kunst &amp; cultuur, muziek en sport. Kunst dient hierbij als conversation piece.
